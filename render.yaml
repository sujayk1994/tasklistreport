# Render.com blueprint — one-click deploy
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: daily-task-db
    databaseName: dailytasks
    plan: free
    region: oregon

services:
  - type: web
    name: daily-task-manager
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: daily-task-db
          property: connectionString
      # ── Generate once, store forever ──
      - key: SESSION_SECRET
        generateValue: true
      # ── Fill these in Render dashboard → Environment after deploy ──
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_PROXY_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
