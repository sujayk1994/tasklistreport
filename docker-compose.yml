version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dailytasks
      POSTGRES_USER: dailytasks
      POSTGRES_PASSWORD: dailytasks_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailytasks"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://dailytasks:dailytasks_local@postgres:5432/dailytasks
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-local-dev-secret-change-me}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
